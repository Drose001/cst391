@if (selectedAlbum === null) {
<div class="list-group">
  @for (album of albums; track $index) {
  <button class="list-group-item" (click)="onSelectAlbum(album)">
    <table align="center">
      <tr>
        <td width="20%">
          <img src="{{ album.image }}" width="50px" height="50px" />
        </td>
        <td>{{ album.title }} from {{ album.year }}</td>
      </tr>
    </table>
  </button>
  }
</div>
} @if (selectedAlbum) {
<app-display-album [album]="selectedAlbum"></app-display-album>
}
