<div *ngIf="album && !editMode" class="container mt-4">
  <div class="card p-4 shadow-sm">
    <h2>{{ album.title }}</h2>

    <p><strong>Artist:</strong> {{ album.artist }}</p>
    <p><strong>Description:</strong> {{ album.description }}</p>
    <p><strong>Year:</strong> {{ album.year }}</p>

    <div class="mb-3" *ngIf="album.image">
      <img
        [src]="album.image"
        [alt]="album.title"
        style="max-width: 250px; height: auto;"
      />
    </div>

    <h3>Tracks</h3>
    <ul class="list-group mb-3" *ngIf="album.tracks && album.tracks.length > 0; else noTracks">
      <li class="list-group-item" *ngFor="let track of album.tracks">
        {{ track.number }}. {{ track.title }}
      </li>
    </ul>

    <ng-template #noTracks>
      <p>No tracks available.</p>
    </ng-template>

    <button class="btn btn-primary" (click)="onEditAlbum()">Edit Album</button>
  </div>
</div>

<div *ngIf="editMode" class="container mt-4">
  <app-edit-album [album]="album" (doneEditing)="onDoneEditing()"></app-edit-album>
</div>
