<div class="container mt-4">
  <div class="card shadow-sm" *ngIf="product as p; else loadingBlock">
    <div class="card-body">
      <h2 class="card-title mb-3">Product Details</h2>

      <p><strong>ID:</strong> {{ p.id }}</p>
      <p><strong>Name:</strong> {{ p.name }}</p>
      <p><strong>Category:</strong> {{ p.category }}</p>
      <p><strong>Quantity:</strong> {{ p.quantity }}</p>
      <p><strong>Price:</strong> {{ p.price }}</p>
      <p><strong>Store:</strong> {{ p.store_name }}</p>
      <p><strong>Purchased:</strong> {{ p.purchased ? 'Yes' : 'No' }}</p>

      <a routerLink="/products" class="btn btn-secondary me-2">Back</a>
      <a [routerLink]="['/products/edit', p.id]" class="btn btn-warning">Edit</a>
    </div>
  </div>

  <ng-template #loadingBlock>
    <div class="alert alert-info">
      Loading product details...
    </div>
  </ng-template>
</div>
