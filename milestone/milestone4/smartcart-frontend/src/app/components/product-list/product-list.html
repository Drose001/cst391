<div class="container mt-4">
  <div class="d-flex justify-content-between align-items-center mb-3">
    <h2>Product List</h2>
    <a routerLink="/products/new" class="btn btn-primary">Add Product</a>
  </div>

  <div *ngIf="loading" class="alert alert-info">
    Loading products...
  </div>

  <div class="table-responsive" *ngIf="!loading">
    <table class="table table-bordered table-striped">
      <thead class="table-dark">
        <tr>
          <th>ID</th>
          <th>Name</th>
          <th>Category</th>
          <th>Quantity</th>
          <th>Price</th>
          <th>Store</th>
          <th>Purchased</th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let product of products; trackBy: trackByProductId">
          <td>{{ product.id }}</td>
          <td>{{ product.name }}</td>
          <td>{{ product.category }}</td>
          <td>{{ product.quantity }}</td>
          <td>{{ product.price }}</td>
          <td>{{ product.store_name }}</td>
          <td>{{ product.purchased ? 'Yes' : 'No' }}</td>
          <td>
            <a [routerLink]="['/products', product.id]" class="btn btn-sm btn-info me-2">View</a>
            <a [routerLink]="['/products/edit', product.id]" class="btn btn-sm btn-warning me-2">Edit</a>
            <button class="btn btn-sm btn-danger" (click)="deleteProduct(product.id)">Delete</button>
          </td>
        </tr>
      </tbody>
    </table>
  </div>
</div>
